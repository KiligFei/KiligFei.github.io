name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 必须先安装 pnpm，然后再运行 setup-node
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8 # 或者 9，取决于你本地的版本

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm # 现在可以安全地使用 pnpm 缓存了

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Static Site Generation
        run: pnpm run generate # 确保 package.json 里有 "generate": "nuxt generate"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
